<script>
    jQuery('img[usemap]').rwdImageMaps();

    var color = d3.scale.category20();
    //$('.player').css('background', color(5));

    var score = [];
    var scoreBk = [];

    updateUndoRedoButton();
    toggleKind();

    // $(document).on('click', '.spike_area', function () {
    //     alert('spike_area');
    // });

    function outputlog() {
        console.log(JSON.stringify(score, null, "    "));
    }
    $(document).on('click', '.det', function () {
        pushScore(getTeam(), getNo(), getAction(), getKind());
        scoreBk = [];
        updateUndoRedoButton();
        outputlog();
        // $('#outputjson').val(JSON.stringify(score, null, "    "));
    });

    $(document).on('click', '.undo', function () {
        if (score.length < 1) {
            return;
        }
        scoreBk.push(score.pop());
        updateUndoRedoButton();
        outputlog();
        // $('#outputjson').val(JSON.stringify(score, null, "    "));
    });

    $(document).on('click', '.redo', function () {
        if (scoreBk.length < 1) {
            return;
        }
        popdata = scoreBk.pop();
        popdata.index = score.length + 1;
        score.push(popdata);
        updateUndoRedoButton();
        outputlog();
        // $('#outputjson').val(JSON.stringify(score, null, "    "));
    });

    $(document).on('click', '.save', function () {

    });

    $(document).on('click', '.grid_style_team_a', function (event) {
        addScore("a");
    });

    $(document).on('click', '.grid_style_team_a', function (event) {
        addScore("b");
    });

    function addScore(team) {
        var no = $(event.target).attr('value');
        pushScore(team, no, getAction(), getKind());
        scoreBk = [];
        updateUndoRedoButton();
        outputlog();
    }

    $(document).on('click', '[name=action]', function () {
        toggleKind();
    });

    function toggleKind() {
        var kind = $('input[name=action]:checked').val();
        if (kind == 'receive') {
            setEnabled("#kind_rally", true);
            setEnabled("#kind_point", true);
            setEnabled("#kind_miss", true);
            setEnabled("#kind_a", true);
            setEnabled("#kind_b", true);
            setEnabled("#kind_c", true);

            // setVisible('.kind_rally_label', true);
            // setVisible('.kind_point_label', true);
            // setVisible('.kind_miss_label', true);
            // setVisible('.kind_a_label', true);
            // setVisible('.kind_b_label', true);
            // setVisible('.kind_c_label', true);
        } else if (kind == 'other_miss' || kind == 'faul') {
            setEnabled("#kind_rally", false);
            setEnabled("#kind_point", false);
            setEnabled("#kind_miss", false);
            setEnabled("#kind_a", false);
            setEnabled("#kind_b", false);
            setEnabled("#kind_c", false);

            // setVisible('.kind_rally_label', false);
            // setVisible('.kind_point_label', false);
            // setVisible('.kind_miss_label', false);
            // setVisible('.kind_a_label', false);
            // setVisible('.kind_b_label', false);
            // setVisible('.kind_c_label', false);
        } else {
            setEnabled("#kind_rally", true);
            setEnabled("#kind_point", true);
            setEnabled("#kind_miss", true);
            setEnabled("#kind_a", false);
            setEnabled("#kind_b", false);
            setEnabled("#kind_c", false);

            // setVisible('.kind_rally_label', true);
            // setVisible('.kind_point_label', true);
            // setVisible('.kind_miss_label', true);
            // setVisible('.kind_a_label', false);
            // setVisible('.kind_b_label', false);
            // setVisible('.kind_c_label', false);
        }
        $('input[name=kind]:eq(0)').prop('checked', true);
        $('input[name=detail]:eq(0)').prop('checked', true);
    }

    $(document).on('click', '[name=kind]', function () {
        $('input[name=detail]:eq(0)').prop('checked', true);
    });

    function getAction() {
        return $('input[name=action]:checked').val();
    }
    function getKind() {
        var kind = $('input[name=action]:checked').val();
        if (kind == 'other_miss' || kind == 'faul') {
            return "";
        }
        return $('input[name=kind]:checked').val();
    }

        // 弾いて落とす、次がつなげられない

        // アウト、ネット

    function pushScore(team, no, action, kind) {
        score.push({
            index: score.length + 1,
            team: team,
            no: no,
            action: action,
            kind: kind,
        });
    }

    function setVisible(selector, visible) {
        if (visible) {
            $(selector).removeClass('item_invisible');
        } else {
            $(selector).addClass('item_invisible');
        }
    }

    function setEnabled(selector, enabled) {
        $(selector).prop("disabled", !enabled);
    }

    function updateUndoRedoButton() {
        if (score.length < 1) {
            $(".undo").prop("disabled", true);
        } else {
            $(".undo").prop("disabled", false);
        }
        if (scoreBk.length < 1) {
            $(".redo").prop("disabled", true);
        } else {
            $(".redo").prop("disabled", false);
        }
    }
</script>
