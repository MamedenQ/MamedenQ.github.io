<script>
    jQuery('img[usemap]').rwdImageMaps();

    var color = d3.scale.category20();
    //$('.player').css('background', color(5));

    var score = [];
    var scoreBk = [];

    updateUndoRedoButton();

    $(document).on('click', '.spike_area', function () {
        alert('spike_area');
    });

    $(document).on('click', '.det', function () {
        pushScore(getTeam(), getNo(), getAction(), getKind());
        scoreBk = []
        updateUndoRedoButton();
        $('#outputjson').val(JSON.stringify(score, null, "    "));
    });

    $(document).on('click', '.undo', function () {
        if (score.length < 1) {
            return;
        }
        scoreBk.push(score.pop());
        updateUndoRedoButton();
        $('#outputjson').val(JSON.stringify(score, null, "    "));
    });

    $(document).on('click', '.redo', function () {
        if (scoreBk.length < 1) {
            return;
        }
        popdata = scoreBk.pop();
        popdata.index = score.length + 1;
        score.push(popdata);
        updateUndoRedoButton();
        $('#outputjson').val(JSON.stringify(score, null, "    "));
    });

    $(document).on('click', '.save', function () {

    $(document).on('click', '[name=action]', function () {
        if ($('input[name=action]:checked').val() == 'receive') {
            // console.log("receive");
            setVisible('.kind_receive', true);
            setVisible('.kind', false);
            $('input[name=kind]:eq(3)').prop('checked', true);
        } else {
            // console.log("not receive");
            setVisible('.kind_receive', false);
            setVisible('.kind', true);
            $('input[name=kind]:eq(0)').prop('checked', true);
        }
    });

    function getTeam() {
        // a,b
        // console.log($('input[name=no]:checked').attr('team'));
        return $('input[name=no]:checked').attr('team');
    }
    function getNo() {
        // 1-99
        return $('input[name=no]:checked').val();
    }
    function getAction() {

    }
    function getKind() {

        return $('input[name=kind]:checked').val();
    }

        // アウト、ネット

    function pushScore(team, no, action, kind) {
        score.push({
            index: score.length + 1,
            team: team,
            no: no,
            action: action,
            kind: kind,
        });
    }

    function setVisible(selector, visible) {
        if (visible) {
            $(selector).removeClass('item_invisible');
        } else {
            $(selector).addClass('item_invisible');
        }
    }

    function updateUndoRedoButton() {
        if (score.length < 1) {
            $(".undo").prop("disabled", true);
        } else {
            $(".undo").prop("disabled", false);
        }
        if (scoreBk.length < 1) {
            $(".redo").prop("disabled", true);
        } else {
            $(".redo").prop("disabled", false);
        }
    }
