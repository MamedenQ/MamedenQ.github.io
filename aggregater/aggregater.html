          <th class='serve_cell'>総<br>数</th>

<script type="text/javascript">
  //*******************************************
  // 変数
  //*******************************************
  var extractYear = 2019;
  var extractMonth = 1;
  var extractPlayerId = -1;
  var extractTeamId = -1;
  var extractSexId = -1;
  var row = 1;

  var searchYear;
  var searchMonth;

  //*******************************************
  // 値初期設定
  //*******************************************
  dict.forEach(function (value) {
    $('.player').append("<option value='" + value.id + "'>" + player[value.id] + "</option>");
  });
  for (var i = 0; i < team.all; i++) {
    $('.team').append("<option value='" + i + "'>" + team[i] + "</option>");
  }
  for (var i = 0; i < sex.all; i++) {
    $('.sex').append("<option value='" + i + "'>" + sex[i] + "</option>");
  }

  //*******************************************
  // コンボ変更イベント
  //*******************************************
  $('.year').change(function () {
    extractYear = $('.year').val();
    if (extractYear == 0) {
      $(".month").prop("disabled", true);
      $('.month').val(0);
      extractMonth = 0;
    } else {
      $(".month").prop("disabled", false);
    }
  });
  $('.month').change(function () {
    extractMonth = $('.month').val();
  });
  $('.team').change(function () {
    extractTeamId = $('.team').val();
    if (extractTeamId == -1) {
      $(".player").prop("disabled", false);
    } else {
      $(".player").prop("disabled", true);
      $('.player').val(-1);
      extractPlayerId = -1;
    }
  });
  $('.player').change(function () {
    extractPlayerId = $('.player').val();
    if (extractPlayerId == -1) {
      $(".team").prop("disabled", false);
      $(".sex").prop("disabled", false);
    } else {
      $(".team").prop("disabled", true);
      $('.team').val(-1);
      extractTeamId = -1;

      $(".sex").prop("disabled", true);
      $('.sex').val(-1);
      extractSexId = -1;
    }
  });
  $('.sex').change(function () {
    extractSexId = $('.sex').val();
  });

  //*******************************************
  // 列表示・非表示チェック
  //*******************************************
  $('#disp_spike').change(function () {
    setVisible('.spike_cell', $(this).prop('checked'));
  });
  $('#disp_serve').change(function () {
    setVisible('.serve_cell', $(this).prop('checked'));
  });
  $('#disp_block').change(function () {
    setVisible('.block_cell', $(this).prop('checked'));
  });
  $('#disp_reception').change(function () {
    setVisible('.reception_cell', $(this).prop('checked'));
  });

  function setVisible(selector, visible) {
    if (visible) {
      $(selector).removeClass('col_invisible');
    } else {
      $(selector).addClass('col_invisible');
    }
  }

  function setAllVisible() {
    setVisible('.spike_cell', $('#disp_spike').prop('checked'));
    setVisible('.serve_cell', $('#disp_serve').prop('checked'));
    setVisible('.block_cell', $('#disp_block').prop('checked'));
    setVisible('.reception_cell', $('#disp_reception').prop('checked'));
  }

  //*******************************************
  // 抽出
  //*******************************************
  $(document).on('click', '.extract', function () {
    $('#data').children().remove();
    row = 1;
    loadData();
  });

  //*******************************************
  // 一覧の行追加
  //*******************************************
  function createNewRow(newRow, playerdata) {
    var total = playerdata.spike.total + playerdata.block.total + playerdata.serve.total + playerdata.receive.total;
    var point = playerdata.spike.point + playerdata.block.point + playerdata.serve.point + playerdata.receive.a;
    var miss = playerdata.spike.miss + playerdata.block.miss + playerdata.serve.miss + playerdata.receive.miss + playerdata.miss_etc;
    var hiraki = -1 * (calcEffectNum(total, point, miss) - calcDetermined(total, point));

    var header = "<td>" + newRow + "</td><td class='nm'><a href='./playerdetail.html?year=" +
      searchYear + "&month=" +
      searchMonth + "&playerid=" +
      playerdata.playerid + "'>" +
      player[playerdata.playerid] + "</a></td><td>" +
      calcEffect(total, point, miss) + "</td><td>" +
      calcDetermined(total, point) + "%</td><td>" +
      hiraki.toFixed(1) + "%" +
      "</td>";
    var spike = createSpikeData(playerdata.spike.total,
      playerdata.spike.point,
      playerdata.spike.miss);
    var serve = createServeData(playerdata.serve.total,
      playerdata.serve.point,
      playerdata.serve.miss);
    var block = createBlockData(playerdata.block.total,
      playerdata.block.point,
      playerdata.block.miss);
    var receive = createReceiveData(playerdata.receive.total,
      playerdata.receive.a,
      playerdata.receive.b,
      playerdata.receive.miss);
    var missEtc = "<td>" + playerdata.miss_etc + "</td>";
    var s = "<tr>" + header + spike + serve + block + receive + missEtc + "</tr>";
    return s;
  };
  function createSpikeData(total, point, miss) {
    var data = "<td class='spike_cell'>" +
      total + "</td><td class='spike_cell'>" +
      point + "</td><td class='spike_cell'>" +
      miss + "</td><td class='spike_cell spike_effect'>" +
      calcEffect(total, point, miss) +
      "</td><td class='spike_cell  spike_det'>" +
      calcDetermined(total, point) + "%</td>";

    return data;
  }
  function createServeData(total, point, miss) {
    var data = "<td class='serve_cell'>" +
      total + "</td><td class='serve_cell'>" +
      point + "</td><td class='serve_cell'>" +
      miss + "</td><td class='serve_cell serve_effect'>" +
      calcEffect(total, point, miss) +
      "</td><td class='serve_cell  serve_det'>" +
      calcDetermined(total, point) + "%</td>";

    return data;
  }
  function createBlockData(total, point, miss) {
    var data = "<td class='block_cell'>" +
      total + "</td><td class='block_cell'>" +
      point + "</td><td class='block_cell'>" +
      miss + "</td><td class='block_cell block_effect'>" +
      calcEffect(total, point, miss) +
      "</td><td class='block_cell  block_det'>" +
      calcDetermined(total, point) + "%</td>";

    return data;
  }

  function createReceiveData(total, a, b, miss) {
    var data = "<td class='reception_cell'>" +
      total + "</td><td class='reception_cell'>" +
      a + "</td><td class='reception_cell'>" +
      b + "</td><td class='reception_cell'>" +
      miss + "</td><td class='reception_cell'>" +
      calcReceiveRate(total, a) +
      "%</td><td class='reception_cell'>" +
      calcReceiveRate(total, b) +
      "%</td><td class='reception_cell'>" +
      calcReceiveRate(total, miss) + "%</td>";

    return data;
  }
  function calcReceiveRate(total, d) {
    var v;
    if (total > 0) {
      v = ((d) / total) * 100;
      v = Math.round(v * 10) / 10;
    } else {
      v = 0;
    }
    return v.toFixed(1);
  }
  function calcReceiveEffect(total, a, b, miss) {
    var v;
    if (total > 0) {
      v = ((a + b - miss) / total) * 100;
      v = Math.round(v * 10) / 10;
    } else {
      v = 0;
    }
    return v.toFixed(1);
  }
  function calcReceiveDetermined(total, a, b) {
    var v;
    if (total > 0) {
      v = ((a + b) / total) * 100;
      v = Math.round(v * 10) / 10;
    } else {
      v = 0;
    }
    return v.toFixed(1);
  }

  //*******************************************
  // json読み込み
  //*******************************************
  function loadData() {
    loadData2();
    setAllVisible();
  };

  function loadData2() {
    var data = loadJson(extractPlayerId, extractYear, extractMonth, extractTeamId, extractSexId);
    searchYear = extractYear;
    searchMonth = extractMonth;

    data.forEach(function (playerData) {
      if (!playerData.isEmpty) {
        var tableObj = $("#data");
        tableObj.append(createNewRow(row, playerData));
        row++;
      }
    });
  }

  loadData();

  // ソート機能は一旦停止
  // var options = {
  //   valueNames: ['spike_effect', 'spike_det', 'serve_effect', 'serve_det', 'block_effect', 'block_det']
  // };
  // var userList = new List('player_list', options);

  /*
                        別ページでjsonを読み込んで値編集する（何も入力しない場合は0から）
                        編集後はjsonを出力する。
                        それをjsファイルに手動反映
                      */
</script>
