<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="../jquery-3.3.1.min.js" charset="utf-8"></script>

  <script src="./data2019.js" charset="utf-8"></script>
  <script src="./data2020.js" charset="utf-8"></script>
  <script src="./dict.js" charset="utf-8"></script>

  <style type="text/css">
  table{
  margin:0 auto;
  border-radius:10px;
  -webkit-border-radius:10px;
  -moz-border-radius:10px;
  border:1px solid #666;
  border-spacing: 0;
  overflow:hidden;

  border-bottom:1px solid #666;
}

  padding:10px;
}

table tbody tr:last-child td{
  border-bottom: none;

  border-left:0px solid #666;
}

  text-align: left;

</head>
<body>
<select class='year'>
    <option value='0'>ALL</option>
    <option value='2019' selected>2019</option>
    <option value='2020'>2020</option>
</select>
<select class='month'>
    <option value='0'>ALL</option>
    <option value='1' selected>1</option>
    <option value='2'>2</option>
    <option value='3'>3</option>
    <option value='4'>4</option>
    <option value='5'>5</option>
    <option value='6'>6</option>
    <option value='7'>7</option>
    <option value='8'>8</option>
    <option value='9'>9</option>
    <option value='10'>10</option>
    <option value='11'>11</option>
    <option value='12'>12</option>
</select>
<br>
<select class='team'>
  <option value='-1' selected>ALL</option>
</select>
<select class='player'>
  <option value='-1' selected>ALL</option>
</select>
<select class='sex'>
  <option value='-1' selected>ALL</option>
</select>
  <button class="extract">抽出</button>
<br>
<br>
<!--   <p>※１　①総数②得点③失点④効果率⑤決定率</p>
  <p>※２　①総数②Aカット③Bカット④失点⑤A率⑥B率</p>
 -->  
  <table>
    <thead>
      <tr>
        <th colspan="2">基本情報</th>
        <th colspan="5">スパイク</th>
        <th colspan="5">サーブ</th>
        <th colspan="5">ブロック</th>
        <th colspan="6">レセプション</th>
      </tr>
      <tr>
        <th>#</th>
        <th>名前</th>

        <th>総<br>数</th>
        <th>得<br>点</th>
        <th>失<br>点</th>
        <th>効<br>果<br>率</th>
        <th>決<br>定<br>率</th>

        <th>総<br>数</th>
        <th>得<br>点</th>
        <th>失<br>点</th>
        <th>効<br>果<br>率</th>
        <th>決<br>定<br>率</th>

        <th>総<br>数</th>
        <th>得<br>点</th>
        <th>失<br>点</th>
        <th>効<br>果<br>率</th>
        <th>決<br>定<br>率</th>

        <th>総<br>数</th>
        <th>A<br>カ<br>ッ<br>ト</th>
        <th>B<br>カ<br>ッ<br>ト</th>
        <th>失<br>点</th>
        <th>A<br>率</th>
        <th>B<br>率</th>
      </tr>
    </thead>
    <tbody id="data">
<!--       <tr>
        <td></td>
        <td></td>
        <td></td><td></td><td></td><td></td><td></td>
        <td></td><td></td><td></td><td></td><td></td>
        <td></td><td></td><td></td><td></td><td></td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr> -->
    </tbody>
  </table>
</body>
<script type="text/javascript">
  //*******************************************
  // 変数
  //*******************************************
  var year = 2019;
  var month = 1;
  var playerid = -1;
  var teamid = -1;
  var sexid = -1;
  var row = 1;

  //*******************************************
  // 値初期設定
  //*******************************************
  dict.forEach(function(value) {
    $('.player').append("<option value='" + value.id + "'>" + player[value.id] + "</option>");
  });
  for(var i = 0; i < team.all; i++) {
    $('.team').append("<option value='" + i + "'>" + team[i] + "</option>");
  }
  for(var i = 0; i < sex.all; i++) {
    $('.sex').append("<option value='" + i + "'>" + sex[i] + "</option>");
  }

  //*******************************************
  // コンボ変更イベント
  //*******************************************
  $('.year').change(function() {
      year = $('.year').val();
      if(year == 0) {
        $(".month").prop("disabled", true);
        $('.month').val(0);
        month = 0;
      } else {
        $(".month").prop("disabled", false);
      }
  });
  $('.month').change(function() {
    month = $('.month').val();
  });
  $('.team').change(function() {
    teamid = $('.team').val();
    if(teamid == -1) {
      $(".player").prop("disabled", false);
    } else {
      $(".player").prop("disabled", true);
      $('.player').val(-1);
      playerid = -1;
    }
  });
  $('.player').change(function() {
    playerid = $('.player').val();
    if(playerid == -1) {
      $(".team").prop("disabled", false);
      $(".sex").prop("disabled", false);
    } else {
      $(".team").prop("disabled", true);
      $('.team').val(-1);
      teamid = -1;

      $(".sex").prop("disabled", true);
      $('.sex').val(-1);
      sexid = -1;
    }
  });
  $('.sex').change(function() {
    sexid = $('.sex').val();
  });

  //*******************************************
  // 抽出
  //*******************************************
  $(document).on('click', '.extract', function() {
    $('#data').children().remove();
    row = 1;
    loadData();
  });

  //*******************************************
  // 一覧の行追加
  //*******************************************
  function createNewRow(newRow, playerdata) {
    var header = "<td>" + newRow + "</td><td class='nm'>" + player[playerdata.playerid] + "</td>";
    var spike = createData(playerdata.spike.total,
      playerdata.spike.point,
      playerdata.spike.miss);
    var serve = createData(playerdata.serve.total,
      playerdata.serve.point,
      playerdata.serve.miss);
    var block = createData(playerdata.block.total,
      playerdata.block.point,
      playerdata.block.miss);
    var receive = createReceiveData(playerdata.receive.total,
      playerdata.receive.a,
      playerdata.receive.b,
      playerdata.receive.miss);

    var s = "<tr>" + header + spike + serve + block + receive + "</tr>";
    return s;
  };
  function createData(total, point, miss) {
    var data = "<td>" + total + "</td><td>" + point + "</td><td>" + miss + "</td><td>" + calcEffect(total, point, miss) + "%</td><td>" + calcDetermined(total, point) + "%</td>";
    return data;
  }
  function calcEffect(total, point, miss) {
    var v;
    if(total > 0) {
      v = ((point - miss) / total) * 100;
      v = Math.round(v * 10) / 10;
    } else {
      v = "0.0";
    }
    return v;
  }
  function calcDetermined(total, point) {
    var v;
    if(total > 0) {
      v = (point / total) * 100;
      v = Math.round(v * 10) / 10;
    } else {
      v = "0.0";
    }
    return v;
  }
  function createReceiveData(total, a, b, miss) {
    var data = "<td>" + total + "</td><td>" + a + "</td><td>" + b + "</td><td>" + miss + "</td><td>" + calcReceiveEffect(total, a, b, miss) + "%</td><td>" + calcReceiveDetermined(total, a, b) + "%</td>";
    return data;
  }
  function calcReceiveEffect(total, a, b, miss) {
    var v;
    if(total > 0) {
      v = ((a + b - miss) / total) * 100;
      v = Math.round(v * 10) / 10;
    } else {
      v = "0.0";
    }
    return v;
  }
  function calcReceiveDetermined(total, a, b) {
    var v;
    if(total > 0) {
      v = ((a + b) / total) * 100;
      v = Math.round(v * 10) / 10;
    } else {
      v = "0.0";
    }
    return v;
  }

  //*******************************************
  // json読み込み
  //*******************************************
  function loadData() {
    var data = [];
    data.push(data2019);
    data.push(data2020);

    data.forEach(eachYear);
  };

  //*******************************************
  // json繰り返し項目の処理
  //*******************************************
  function eachYear(yearData) {
    console.log("year[" + yearData.year + "]");

    var disp = false;

    if(year == 0) {
      disp = true;
    } else if(yearData.year == year) {
      disp = true;
    }

    if(disp) {
      yearData.data.forEach(eachMonth);
    }
  };
  function eachMonth(monthData) {
    console.log("month[" + monthData.month + "]");
    var disp = false;
    if(month == 0) {
      disp = true;
    } else if(monthData.month == month) {
      disp = true;
    }

    if(disp) {
      console.log("match");
      monthData.data.forEach(eachPlayer);
    }
  };
  function eachPlayer(playerdata) {
    console.log("name[" + player[playerdata.playerid] + "]");
    var disp = false;
    if(playerid == -1) {
      if(teamid == -1) {
        disp = true;
      } else {
        var belongTeamId = getTeamId(playerdata.playerid);
        console.log("teamid[" + teamid + "] belongTeamId[" + belongTeamId + "]");
        if(belongTeamId == teamid) {
          console.log("team match");
          disp = true;
        }
      }
      if(disp) {
        console.log("sex判定");
        if(sexid != -1) {
          var sex = getSexId(playerdata.playerid);
          console.log("sex[" + sex + "]");
          if(sex != sexid) {
            console.log("sex mismatch");
            disp = false;
          }
        }
      }
    } else if(playerid == playerdata.playerid) {
      disp = true;
    }
    
    if(disp) {
      console.log("match player");
      var tableObj = $("#data");
      tableObj.append(createNewRow(row, playerdata));
      row++;
    }
  };
  //*******************************************
  // jsonから抽出
  //*******************************************
  function getTeamId(playerId) {
    var id = -1;
    dict.forEach(function(value) {
      if(playerId == value.id) {
        id = value.teamid;
      }
    });
    return id;
  }
  function getSexId(playerId) {
    var id = -1;
    dict.forEach(function(value) {
      if(playerId == value.id) {
        id = value.sex;
      }
    });
    return id;
  }

  loadData();
/*
  別ページでjsonを読み込んで値編集する（何も入力しない場合は0から）
  編集後はjsonを出力する。
  それをjsファイルに手動反映
*/
</script>
</html>
