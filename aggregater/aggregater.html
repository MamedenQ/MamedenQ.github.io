<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="../jquery-3.3.1.min.js" charset="utf-8"></script>

  <script src="./data.js" charset="utf-8"></script>

  <style type="text/css">
  table{
  margin:0 auto;
  border-radius:10px;

  border-bottom:1px solid #666;
}

  background:#cecece;
}
table tbody tr:last-child th,
table tbody tr:last-child td{
  border-bottom: none;
}
th + th,td{
  border-left:1px solid #666;
}
  </style>
</head>
<body>
  <button class="clear">clear</button>
  <button class="add">add</button>
<!-- 
  <p>※１　①総数②得点③失点④効果率⑤決定率</p>
  <p>※２　①総数②Aカット③Bカット④失点⑤A率⑥B率</p>
 -->  
  <table>
    <thead>
      <tr>
        <th colspan="2">基本情報</th>
        <th colspan="5">スパイク</th>
        <th colspan="5">サーブ</th>
        <th colspan="5">ブロック</th>
        <th colspan="6">レシーブ</th>
      </tr>
      <tr>
        <th>#</th>
        <th>名前</th>
        
        <th>総<br>数</th>
        <th>得<br>点</th>
        <th>失<br>点</th>
        <th>効<br>果<br>率<br>(％)</th>
        <th>決<br>定<br>率<br>(％)</th>

        <th>総<br>数</th>
        <th>得<br>点</th>
        <th>失<br>点</th>
        <th>効<br>果<br>率<br>(％)</th>
        <th>決<br>定<br>率<br>(％)</th>

        <th>総<br>数</th>
        <th>得<br>点</th>
        <th>失<br>点</th>
        <th>効<br>果<br>率<br>(％)</th>
        <th>決<br>定<br>率<br>(％)</th>

        <th>総<br>数</th>
        <th>A<br>カ<br>ッ<br>ト</th>
        <th>B<br>カ<br>ッ<br>ト</th>
        <th>失<br>点</th>
        <th>A<br>率<br>(％)</th>
        <th>B<br>率<br>(％)</th>
      </tr>
    </thead>
    <tbody id="data">
<!--       <tr>
        <td></td>
        <td></td>
        <td></td><td></td><td></td><td></td><td></td>
        <td></td><td></td><td></td><td></td><td></td>
        <td></td><td></td><td></td><td></td><td></td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr> -->
    </tbody>
  </table>
</body>
<script type="text/javascript">
  $(document).on('click', '.clear', function() {
    $('#data').children().remove();
  });

  $(document).on('click', '.add', function() {
    $('#data').append(createNewRowEmpty());
  });

  function createNewRowEmpty() {
    var s = "<tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>";
    return s;
  };

  function createNewRow(value) {
    var header = "<td></td><td>" + value.name + "</td>";
    var spike = createData(value.spike.total,
      value.spike.point,
      value.spike.miss);
    var serve = createData(value.serve.total,
      value.serve.point,
      value.serve.miss);
    var block = createData(value.block.total,
      value.block.point,
      value.block.miss);
    var receive = createReceiveData(value.receive.total,
      value.receive.a,
      value.receive.b,
      value.receive.miss);

    var s = "<tr>" + header + spike + serve + block + receive + "</tr>";
    return s;
  };
  function createData(total, point, miss) {
    var data = "<td>" + total + "</td><td>" + point + "</td><td>" + miss + "</td><td>" + calcEffect(total, point, miss) + "%</td><td>" + calcDetermined(total, point) + "%</td>";
    return data;
  }
  function calcEffect(total, point, miss) {
    return ((point - miss) / total) * 100;
  }
  function calcDetermined(total, point) {
    return (point / total) * 100;
  }
  function createReceiveData(total, a, b, miss) {
    var data = "<td>" + total + "</td><td>" + a + "</td><td>" + b + "</td><td>" + miss + "</td><td>" + calcReceiveEffect(total, a, b, miss) + "%</td><td>" + calcReceiveDetermined(total, a, b) + "%</td>";
    return data;
  }
  function calcReceiveEffect(total, a, b, miss) {
    return ((a + b - miss) / total) * 100;
  }
  function calcReceiveDetermined(total, a, b) {
    return ((a + b) / total) * 100;
  }

  var year = 2019;
  var month = 1;

  function loadData() {
    data.forEach(ym);
  };

  function ym(value) {
    console.log("year[" + value.year + "] month[" + value.month + "]");
    if(value.year == year) {
      if(value.month == month) {
        console.log("match");
        value.data.forEach(personal);
      }
    }
  };

  function personal(value) {
    console.log("name[" + value.name + "]");
    var tableObj = $("#data");
    // tableObj.append(createNewRowEmpty());
    tableObj.append(createNewRow(value));
  };

  loadData();
</script>
</html>
