<body>

<br>

  <table>
    <thead>
      <tr>
        <th colspan="2">基本情報</th>
        <th colspan="5">スパイク</th>
        <th colspan="5">サーブ</th>
        <th colspan="5">ブロック</th>
        <th colspan="6">レシーブ</th>
      </tr>
      <tr>
        <th>#</th>
        <th>名前</th>

        <th>総<br>数</th>
        <th>得<br>点</th>
        <th>失<br>点</th>
        <th>効<br>果<br>率</th>
        <th>決<br>定<br>率</th>

        <th>総<br>数</th>
        <th>得<br>点</th>
        <th>失<br>点</th>
        <th>効<br>果<br>率</th>
        <th>決<br>定<br>率</th>

        <th>総<br>数</th>
        <th>得<br>点</th>
        <th>失<br>点</th>
        <th>効<br>果<br>率</th>
        <th>決<br>定<br>率</th>

        <th>総<br>数</th>
        <th>A<br>カ<br>ッ<br>ト</th>
        <th>B<br>カ<br>ッ<br>ト</th>
        <th>失<br>点</th>
        <th>A<br>率</th>

    </thead>
    <tbody id="data">
<!--       <tr>
        <td></td>

        <td></td><td></td><td></td><td></td><td></td>

        <td></td><td></td><td></td><td></td><td></td>
      </tr> -->
    </tbody>
  </table>
</body>
<script type="text/javascript">
  var year = 2019;
  var month = 1;
  var row = 1;

  $('.year').change(function() {
      year = $('.year').val();
      if(year == 0) {
        $(".month").prop("disabled", true);
        $('.month').val(0);
        month = 0;
      } else {
        $(".month").prop("disabled", false);
      }
  });

  $('.month').change(function() {
      month = $('.month').val();
  });

  $(document).on('click', '.extract', function() {
    $('#data').children().remove();
    row = 1;
    loadData();
  });

  function createNewRow(newRow, value) {
    var header = "<td>" + newRow + "</td><td class='nm'>" + value.name + "</td>";
    var spike = createData(value.spike.total,
      value.spike.point,
      value.spike.miss);
    var serve = createData(value.serve.total,
      value.serve.point,
      value.serve.miss);
    var block = createData(value.block.total,
      value.block.point,
      value.block.miss);
    var receive = createReceiveData(value.receive.total,
      value.receive.a,
      value.receive.b,
      value.receive.miss);

    var s = "<tr>" + header + spike + serve + block + receive + "</tr>";
    return s;
  };
  function createData(total, point, miss) {
    var data = "<td>" + total + "</td><td>" + point + "</td><td>" + miss + "</td><td>" + calcEffect(total, point, miss) + "%</td><td>" + calcDetermined(total, point) + "%</td>";
    return data;
  }
  function calcEffect(total, point, miss) {
    return ((point - miss) / total) * 100;
  }
  function calcDetermined(total, point) {
    return (point / total) * 100;
  }
  function createReceiveData(total, a, b, miss) {
    var data = "<td>" + total + "</td><td>" + a + "</td><td>" + b + "</td><td>" + miss + "</td><td>" + calcReceiveEffect(total, a, b, miss) + "%</td><td>" + calcReceiveDetermined(total, a, b) + "%</td>";
    return data;
  }
  function calcReceiveEffect(total, a, b, miss) {
    return ((a + b - miss) / total) * 100;
  }
  function calcReceiveDetermined(total, a, b) {
    return ((a + b) / total) * 100;
  }

  function loadData() {
    var data = [];
    data.push(data2019);
    data.push(data2020);

    data.forEach(y);
  };

  function y(value) {
    console.log("year[" + value.year + "]");

    var disp = false;

    if(year == 0) {
      disp = true;
    } else if(value.year == year) {
      disp = true;
    }

    if(disp) {
      value.data.forEach(m);
    }
  };

  function m(value) {
    console.log("month[" + value.month + "]");
    var disp = false;
    if(month == 0) {
      disp = true;
    } else if(value.month == month) {
      disp = true;
    }

    if(disp) {
      console.log("match");
      value.data.forEach(personal);
    }
  };

  function personal(value) {
    console.log("name[" + value.name + "]");
    var tableObj = $("#data");
    // tableObj.append(createNewRowEmpty());
    tableObj.append(createNewRow(row, value));
    row = row + 1;
  };

  loadData();

</script>
</html>
