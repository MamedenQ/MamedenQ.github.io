    <table class="table table-striped table-hover table-bordered" id="player_list">

        <tr>

          <th class='spike_cell'>総<br>数</th>

          <th class='serve_cell'>総<br>数</th>

          <th class='serve_cell sort' data-sort="serve_det">決<br>定<br>率</th>

          <th class='block_cell sort' data-sort="block_effect">効<br>果<br>率</th>
          <th class='block_cell sort' data-sort="block_det">決<br>定<br>率</th>

          <th class='reception_cell'>総<br>数</th>
          <th class='reception_cell'>A<br>カ<br>ッ<br>ト</th>
          <th class='reception_cell'>B<br>カ<br>ッ<br>ト</th>

<script type="text/javascript">
  //*******************************************
  // 変数
  //*******************************************
  var extractYear = 2019;
  var extractMonth = 1;
  var extractPlayerId = -1;
  var extractTeamId = -1;
  var extractSexId = -1;
  var row = 1;

  //*******************************************
  // 値初期設定
  //*******************************************
  dict.forEach(function (value) {
    $('.player').append("<option value='" + value.id + "'>" + player[value.id] + "</option>");
  });
  for (var i = 0; i < team.all; i++) {
    $('.team').append("<option value='" + i + "'>" + team[i] + "</option>");
  }
  for (var i = 0; i < sex.all; i++) {
    $('.sex').append("<option value='" + i + "'>" + sex[i] + "</option>");
  }

  //*******************************************
  // コンボ変更イベント
  //*******************************************
  $('.year').change(function () {
    extractYear = $('.year').val();
    if (extractYear == 0) {
      $(".month").prop("disabled", true);
      $('.month').val(0);
      extractMonth = 0;
    } else {
      $(".month").prop("disabled", false);
    }
  });
  $('.month').change(function () {
    extractMonth = $('.month').val();
  });
  $('.team').change(function () {
    extractTeamId = $('.team').val();
    if (extractTeamId == -1) {
      $(".player").prop("disabled", false);
    } else {
      $(".player").prop("disabled", true);
      $('.player').val(-1);
      extractPlayerId = -1;
    }
  });
  $('.player').change(function () {
    extractPlayerId = $('.player').val();
    if (extractPlayerId == -1) {
      $(".team").prop("disabled", false);
      $(".sex").prop("disabled", false);
    } else {
      $(".team").prop("disabled", true);
      $('.team').val(-1);
      extractTeamId = -1;

      $(".sex").prop("disabled", true);
      $('.sex').val(-1);
      extractSexId = -1;
    }
  });
  $('.sex').change(function () {
    extractSexId = $('.sex').val();
  });

  //*******************************************
  // 列表示・非表示チェック
  //*******************************************
  $('#disp_spike').change(function () {
    setVisible('.spike_cell', $(this).prop('checked'));
  });
  $('#disp_serve').change(function () {
    setVisible('.serve_cell', $(this).prop('checked'));
  });
  $('#disp_block').change(function () {
    setVisible('.block_cell', $(this).prop('checked'));
  });
  $('#disp_reception').change(function () {
    setVisible('.reception_cell', $(this).prop('checked'));
  });

  function setVisible(selector, visible) {
    if (visible) {
      $(selector).removeClass('col_invisible');
    } else {
      $(selector).addClass('col_invisible');
    }
  }

  function setAllVisible() {
    setVisible('.spike_cell', $('#disp_spike').prop('checked'));
    setVisible('.serve_cell', $('#disp_serve').prop('checked'));
    setVisible('.block_cell', $('#disp_block').prop('checked'));
    setVisible('.reception_cell', $('#disp_reception').prop('checked'));
  }

  //*******************************************
  // 抽出
  //*******************************************
  $(document).on('click', '.extract', function () {
    $('#data').children().remove();
    row = 1;
    loadData();
  });

  //*******************************************
  // 一覧の行追加
  //*******************************************
  function createNewRow(newRow, playerdata) {
    var header = "<td>" + newRow + "</td><td class='nm'>" + player[playerdata.playerid] + "</td>";
    var spike = createSpikeData(playerdata.spike.total,
      playerdata.spike.point,
      playerdata.spike.miss);
    var serve = createServeData(playerdata.serve.total,
      playerdata.serve.point,
      playerdata.serve.miss);
    var block = createBlockData(playerdata.block.total,
      playerdata.block.point,
      playerdata.block.miss);
    var receive = createReceiveData(playerdata.receive.total,
      playerdata.receive.a,
      playerdata.receive.b,
      playerdata.receive.miss);

    var s = "<tr>" + header + spike + serve + block + receive + "</tr>";
    return s;
  };
  function createSpikeData(total, point, miss) {
    var data = "<td class='spike_cell'>" +
      total + "</td><td class='spike_cell'>" +
      point + "</td><td class='spike_cell'>" +
      miss + "</td><td class='spike_cell spike_effect'>" +
      calcEffect(total, point, miss) +
      "%</td><td class='spike_cell  spike_det'>" +
      calcDetermined(total, point) + "%</td>";

    return data;
  }
  function createServeData(total, point, miss) {
    var data = "<td class='serve_cell'>" +
      total + "</td><td class='serve_cell'>" +
      point + "</td><td class='serve_cell'>" +
      miss + "</td><td class='serve_cell serve_effect'>" +
      calcEffect(total, point, miss) +
      "%</td><td class='serve_cell  serve_det'>" +
      calcDetermined(total, point) + "%</td>";

    return data;
  }
  function createBlockData(total, point, miss) {
    var data = "<td class='block_cell'>" +
      total + "</td><td class='block_cell'>" +
      point + "</td><td class='block_cell'>" +
      miss + "</td><td class='block_cell block_effect'>" +
      calcEffect(total, point, miss) +
      "%</td><td class='block_cell  block_det'>" +
      calcDetermined(total, point) + "%</td>";

    return data;
  }
  function calcEffect(total, point, miss) {
    var v;
    if (total > 0) {
      v = ((point - miss) / total) * 100;
      v = Math.round(v * 10) / 10;
    } else {
      v = "0.0";
    }
    return v;
  }
  function calcDetermined(total, point) {
    var v;
    if (total > 0) {
      v = (point / total) * 100;
      v = Math.round(v * 10) / 10;
    } else {
      v = "0.0";
    }
    return v;
  }
  function createReceiveData(total, a, b, miss) {
    var data = "<td class='reception_cell'>" +
      total + "</td><td class='reception_cell'>" +
      a + "</td><td class='reception_cell'>" +
      b + "</td><td class='reception_cell'>" +
      miss + "</td><td class='reception_cell'>" +
      calcReceiveEffect(total, a, b, miss) +
      "%</td><td class='reception_cell'>" +
      calcReceiveDetermined(total, a, b) + "%</td>";

    return data;
  }
  function calcReceiveEffect(total, a, b, miss) {
    var v;
    if (total > 0) {
      v = ((a + b - miss) / total) * 100;
      v = Math.round(v * 10) / 10;
    } else {
      v = "0.0";
    }
    return v;
  }
  function calcReceiveDetermined(total, a, b) {
    var v;
    if (total > 0) {
      v = ((a + b) / total) * 100;
      v = Math.round(v * 10) / 10;
    } else {
      v = "0.0";
    }
    return v;
  }

  //*******************************************
  // json読み込み
  //*******************************************
  function loadData() {
    // var data = [];
    // data.push(data2019);
    // data.push(data2020);

    // data.forEach(eachYear);
    loadData2();
    setAllVisible();
  };

  function loadData2() {
    var data = [];
    // var idx = 1;

    // そのうちdictの順番を入れ替えて表示順調整する予定のため、
    // dict基準でjson作る
    dict.forEach(function (dictData) {
      if (isDispPlayer(dictData.id)) {
        data.push({
          "playerid": dictData.id,
          "spike": {
            "total": 0,
            "point": 0,
            "miss": 0,
            "etc": 0,
          },
          "serve": {
            "total": 0,
            "point": 0,
            "miss": 0,
            "etc": 0,
          },
          "block": {
            "total": 0,
            "point": 0,
            "miss": 0,
            "etc": 0,
          },
          "receive": {
            "total": 0,
            "a": 0,
            "b": 0,
            "miss": 0,
            "etc": 0,
          },
        });
        // idx++;
      }
    });

    var yearData = [];
    yearData.push(data2019);
    yearData.push(data2020);

    yearData.forEach(function (yearData) {
      if (isDispYear(yearData.year)) {
        yearData.data.forEach(function (monthData) {
          if (isDispMonth(monthData.month)) {
            monthData.data.forEach(function (playerData) {
              if (isDispPlayer(playerData.playerid)) {
                var dt = getPlayerData(playerData.playerid);
                add(dt.spike, playerData.spike);
                add(dt.serve, playerData.serve);
                add(dt.block, playerData.block);
                addReceive(dt.receive, playerData.receive);
              }

              function add(dt, addDt) {
                dt.point += addDt.point;
                dt.miss += addDt.miss;
                dt.etc += addDt.etc;
                dt.total += addDt.total;
              };
              function addReceive(dt, addDt) {
                dt.a += addDt.a;
                dt.b += addDt.b;
                dt.miss += addDt.miss;
                dt.etc += addDt.etc;
                dt.total += addDt.total;
              };
            });
          }
        });
      }
    });

    function getPlayerData(playerid) {
      // {}でhash作っておいてそこからアクセスした方が早い？
      var dt = {};
      var hit = false;

      data.forEach(function (playerData) {
        if (!hit) {
          if (playerData.playerid == playerid) {
            dt = playerData;
            hit = true;
          }
        }
      });

      return dt;
    }

    data.forEach(function (playerData) {
      var tableObj = $("#data");
      tableObj.append(createNewRow(row, playerData));
      row++;
    });
  }

  //*******************************************
  // 判定処理
  //*******************************************
  function isDispPlayer(playerid) {
    var disp = false;
    if (playerid == -1) {
      if (extractTeamId == -1) {
        disp = true;
      } else {
        var belongTeamId = getTeamId(playerid);
        if (belongTeamId == extractTeamId) {
          disp = true;
        }
      }
      if (disp) {
        if (extractSexId != -1) {
          var sex = getSexId(playerid);
          if (sex != extractSexId) {
            disp = false;
          }
        }
      }
    } else if (playerid == playerid) {
      disp = true;
    }

    return disp;
  }
  function isDispYear(year) {
    var disp = false;

    if (extractYear == 0) {
      disp = true;
    } else if (year == extractYear) {
      disp = true;
    }

    return disp;
  }
  function isDispMonth(month) {
    var disp = false;

    if (extractMonth == 0) {
      disp = true;
    } else if (month == extractMonth) {
      disp = true;
    }

    return disp;
  }

  //*******************************************
  // json繰り返し項目の処理
  //*******************************************
  function eachYear(yearData) {
    console.log("year[" + yearData.year + "]");

    var disp = false;

    if (extractYear == 0) {
      disp = true;
    } else if (yearData.year == extractYear) {
      disp = true;
    }

    if (disp) {
      yearData.data.forEach(eachMonth);
    }
  };
  function eachMonth(monthData) {
    console.log("month[" + monthData.month + "]");
    var disp = false;
    if (extractMonth == 0) {
      disp = true;
    } else if (monthData.month == extractMonth) {
      disp = true;
    }

    if (disp) {
      console.log("match");
      monthData.data.forEach(eachPlayer);
    }
  };
  function eachPlayer(playerdata) {
    console.log("name[" + player[playerdata.playerid] + "]");
    var disp = false;
    if (extractPlayerId == -1) {
      if (extractTeamId == -1) {
        disp = true;
      } else {
        var belongTeamId = getTeamId(playerdata.playerid);
        console.log("teamid[" + extractTeamId + "] belongTeamId[" + belongTeamId + "]");
        if (belongTeamId == extractTeamId) {
          console.log("team match");
          disp = true;
        }
      }
      if (disp) {
        console.log("sex判定");
        if (extractSexId != -1) {
          var sex = getSexId(playerdata.playerid);
          console.log("sex[" + sex + "]");
          if (sex != extractSexId) {
            console.log("sex mismatch");
            disp = false;
          }
        }
      }
    } else if (extractPlayerId == playerdata.playerid) {
      disp = true;
    }

    if (disp) {
      console.log("match player");
      var tableObj = $("#data");
      tableObj.append(createNewRow(row, playerdata));
      row++;
    }
  };
  //*******************************************
  // jsonから抽出
  //*******************************************
  function getTeamId(playerId) {
    var id = -1;
    dict.forEach(function (value) {
      if (playerId == value.id) {
        id = value.teamid;
      }
    });
    return id;
  }
  function getSexId(playerId) {
    var id = -1;
    dict.forEach(function (value) {
      if (playerId == value.id) {
        id = value.sex;
      }
    });
    return id;
  }

  loadData();
  
  var options = {
  valueNames: [ 'spike_effect','spike_det', 'serve_effect', 'serve_det', 'block_effect', 'block_det' ]
};
var userList = new List('player_list', options);

/*
                      別ページでjsonを読み込んで値編集する（何も入力しない場合は0から）
                      編集後はjsonを出力する。
                      それをjsファイルに手動反映
                    */
</script>
