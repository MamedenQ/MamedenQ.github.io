	function loadData() {
		var query = getQuery();

		var spikeEffect = calcEffectNum(player.spike.total, player.spike.point, player.spike.miss);
		var serveEffect = calcEffectNum(player.serve.total, player.serve.point, player.serve.miss);
		var blockEffect = calcEffectNum(player.block.total, player.block.point, player.block.miss);

		createEffectDistribution(spikeEffect, blockEffect, serveEffect);

		createMissDistribution(player.spike.miss, player.block.miss, player.serve.miss);

function createDetDistribution(spike, block, serve) {
