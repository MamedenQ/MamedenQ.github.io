<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Document</title>

	<meta name="viewport" content="width=device-width,initial-scale=1">

	<script src="../jquery-3.3.1.min.js" charset="utf-8"></script>

	<!-- Load c3.css -->
	<link href="../c3js/c3.css" rel="stylesheet">

	<!-- Load d3.js and c3.js -->
	<script src="../d3js/d3.v5.min.js" charset="utf-8"></script>
	<script src="../c3js/c3.js"></script>
</head>

<body>
	<div id="chart" style="width:30%"></div>
	<div id="chart2" style="width:30%"></div>
</body>
<script>
	var chart = c3.generate({
		bindto: '#chart',
		data: {
			columns: [
				['data1', 30, 200, 100, 400, 150, 250],
				['data2', 50, 20, 10, 40, 15, 25]
			]
		}
	});

	var chart2 = c3.generate({
		bindto: '#chart2',
		data: {
			columns: [['spike', 15], ['block', 20],
			['serve', 10],],
			type: 'donut'
		},
		donut: { title: "得点要因" }
	}
	);

	// クエリ文字列取得
	function getQuery() {
		var data = {};

		var query = $(location).attr('search');
		var params = query.split("?");
		params = params[1].split("&");

		for (i = 0; i < params.length; i++) {
			var vol = params[i].split("=");
			data[vol[0]] = vol[1];
		}

		var hash = $(location).attr('hash');
		var h = hash.split("#");

		data['#'] = h[1];

		return data;
	}

	console.log(getQuery());
</script>

</html>
