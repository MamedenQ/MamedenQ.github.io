<script type="text/javascript">
    $('#data').sortable();
    var idx = 1;
    function init() {
        $('#data').children().remove();
        idx = 1;
        dict.forEach(function (dictData) {
            var name = player[dictData.id];
            $('#data').append(createNewRow(idx, dictData.id, name));
            idx++;
        });

        var v = $('#inputjson').val();
        if (v != "") {
            for (var i = 0; i < $(".player").length; i++) {
                var row = $(".player").eq(i);
                var playerid = row.attr('playerid');
                var obj = $.parseJSON(v);
                obj.data.forEach(function (monthData) {
                    monthData.data.forEach(function (playerData) {
                        if (playerid == playerData.playerid) {
                            row.find('.spike_point').val(playerData.spike.point);
                            row.find('.spike_miss').val(playerData.spike.miss);
                            row.find('.spike_else').val(playerData.spike.etc);

                            row.find('.serve_point').val(playerData.serve.point);
                            row.find('.serve_miss').val(playerData.serve.miss);
                            row.find('.serve_else').val(playerData.serve.etc);

                            row.find('.block_point').val(playerData.block.point);
                            row.find('.block_miss').val(playerData.block.miss);
                            row.find('.block_else').val(playerData.block.etc);

                            row.find('.reception_a').val(playerData.receive.a);
                            row.find('.reception_b').val(playerData.receive.b);
                            row.find('.reception_miss').val(playerData.receive.miss);
                            row.find('.reception_else').val(playerData.receive.etc);
                        }
                    });
                });
            }
        }
    };

    $(document).on('click', '#out', function () {
        var data = createJsonYearData(2019, 1);
        // alert(JSON.stringify(data));
        $('#outputjson').val(JSON.stringify(data, null, "    "));
    });
    $(document).on('click', '#in', function () {
        init();
    });
    // プレーヤID、スパイク得点、、、をカンマ区切りで行ごとの文字列を変換
    //　プレーヤIDはXXX:名前で来るため、:をsplitするように修正する
    $(document).on('click', '#in2', function () {
        var v = $('#inputjson2').val();
        console.log
        var data = [];
        v.split(/\n/).forEach(function (row) {
            if (row == "") {
                console.log("empty!!!");
                return;
            }
            // console.log(row);
            var playerdata = {};
            // value.split(',').forEach(function(value) {
            // });
            var value = row.split(',');
            for (var i = 0; i < value.length; i++) {
                if(i == 0) {
                    value[i] = value[i].split(":")[0];
                } else {
                    value[i] = Number(value[i]);
                }
            }
            playerdata.playerid = value[0];

            var spike = {};
            spike.point = value[1];
            spike.miss = value[2] + value[3] + value[4];
            spike.miss_detail = {
                net: value[2],
                out: value[3],
                block: value[4],
            };
            spike.etc = value[5];
            spike.total = spike.point + spike.miss + spike.etc;
            playerdata.spike = spike;

            var serve = {};
            serve.point = value[6];
            serve.miss = value[7] + value[8];
            serve.miss_detail = {
                net: value[7],
                out: value[8],
            };
            serve.etc = value[9];
            serve.total = serve.point + serve.miss + serve.etc;
            playerdata.serve = serve;

            var receive = {};
            receive.a = value[10];
            receive.b = value[11];
            receive.miss = value[12];
            receive.total = receive.a + receive.b + receive.miss;
            playerdata.receive = receive;

            var block = {};
            block.point = value[13];
            block.miss = value[14];
            block.etc = value[15];
            block.total = block.point + block.miss + block.etc;
            playerdata.block = block;

            playerdata.miss_etc = value[16];

            playerdata.win = value[17];

            data.push(playerdata);
        });

        $('#inputjson').val(JSON.stringify(data, null, "    "));
    });
    function createJsonYearData(year, month) {
        var d = [];
        d.push(createJsonMonthlyData(month));
        var data = {
            year: year,
            data: d,
        };
        return data;
    }
    function createJsonMonthlyData(month) {
        var d = [];
        for (var i = 0; i < $(".player").length; i++) {
            var row = $(".player").eq(i);
            var playerid = row.attr('playerid');
            var s = createJsonPlayerData(playerid, row);
            d.push(s);
        }
        var data = {
            month: month,
            data: d,
        }

        return data;
    }
    function createJsonPlayerData(playerid, row) {
        var spikePoint, spikeMiss, spikeEtc;
        spikePoint = Number(row.find('.spike_point').val());
        spikeMiss = Number(row.find('.spike_miss').val());
        spikeEtc = Number(row.find('.spike_else').val());
        var servePoint, serveMiss, serveEtc;
        servePoint = Number(row.find('.serve_point').val());
        serveMiss = Number(row.find('.serve_miss').val());
        serveEtc = Number(row.find('.serve_else').val());
        var receiveA, receiveB, receiveMiss, receiveEtc;
        receiveA = Number(row.find('.reception_a').val());
        receiveB = Number(row.find('.reception_b').val());
        receiveMiss = Number(row.find('.reception_miss').val());
        receiveEtc = Number(row.find('.reception_else').val());
        var blockPoint, blockMiss, blockEtc;
        blockPoint = Number(row.find('.block_point').val());
        blockMiss = Number(row.find('.block_miss').val());
        blockEtc = Number(row.find('.block_else').val());
        var d = {
            playerid: playerid,
            spike: createJsonPoint(spikePoint, spikeMiss, spikeEtc),
            serve: createJsonPoint(servePoint, serveMiss, serveEtc),
            receive: createJsonReception(receiveA, receiveB, receiveMiss, receiveEtc),
            block: createJsonPoint(blockPoint, blockMiss, blockEtc),
        }
        return d;
    }
    function createJsonPoint(point, miss, etc) {
        var d = {
            total: point + miss + etc,
            point: point,
            miss: miss,
            etc: etc,
        };

        return d;
    }
    function createJsonReception(a, b, miss, etc) {
        var d = {
            total: a + b + miss + etc,
            a: a,
            b: b,
            miss: miss,
            etc: etc,
        };

        return d;
    }

    $(document).on('click', '.minus', function () {
        updown($(this), -1);
    });
    $(document).on('click', '.plus', function () {

    function updown(item, val) {
        var input = item.parent().children('input');
        var v = Number(input.val()) + val;
        if (v >= 0) {
            input.val(v);
        }
    }

        },
        stop: function (event, ui) {

    function erasePoint() {
        for (var i = 0; i < $(".point").length; i++) {
            $('.point').eq(i).removeClass('visible');
            $('.point').eq(i).addClass('invisible');
        }
    }
    function eraseServe() {
        for (var i = 0; i < $(".serve_detail").length; i++) {
            $('.serve_detail').eq(i).removeClass('visible');
            $('.serve_detail').eq(i).addClass('invisible');
        }
    }

    function fadeInPlayer() {
        $('.active_player').each(function () {
            $(this).css('transition', '0.5s ease');
            $(this).css('opacity', 1.0);
        });
    }

    function dispactionPoint(obj, isFull) {
        dispaction(obj, ".point", isFull);
    }
    function dispactionServe(obj, isFull) {
        dispaction(obj, ".serve_detail", isFull);
    }

    function dispaction(obj, target, isFull) {
        // 周りに丸を並べる
        // サーブ、スパイク、フェイント、ブロック、レシーブ
        // 失点、リベロ、ファウル
        var num = $(target).length;
        // console.log(num);
        var range;
        var len;
        if (isFull == true) {
            range = 360;
            len = 120;
        } else {
            range = 180;
            len = 200;
        }

        var ang = range / num;
        // console.log($('.item_Parent').width);
        pos.left = $(window).width() / 2;
        var top = pos.top + 250;

        for (var i = 0; i < num; i++) {
            // 座標を算出
            //var curang = (ang / 2) + ang * i;
            var curang = ang * (i + 1);
            var x = len * Math.cos(curang / 180 * Math.PI) + pos.left;
            var y = len * Math.sin(curang / 180 * Math.PI) + top;
            // console.log('x' + x + ',y' + y);

            $(target).eq(i).css('top', y + 'px');
            $(target).eq(i).css('left', x + 'px');
            // $('.point').eq(i).css('visibility', '');
            // $('.point').eq(i).css('transition', '0.5s ease');

            // classで指定されているvisibilityをcssメソッド（style?）で上書きすることができない。
            $(target).eq(i).removeClass('invisible');
            $(target).eq(i).addClass('visible');
        }

        // obj.css('z-index', '1');
    }
