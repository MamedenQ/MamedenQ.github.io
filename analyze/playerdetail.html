	function loadData() {
		var query = getQuery();
		//console.log(query);

		var data = loadJson(query.playerid, query.year, query.month, -1, -1);

		// data.forEach(function (playerData) {
		// 	// var tableObj = $("#data");
		// 	// tableObj.append(createNewRow(row, playerData));
		// 	// row++;ß


		$('.playername').val(player[data.playerid]);
		// 	// データ用のjsonを作り上げる
		// 	createPointDistribution()
		// });
		var playerdata;

		if (query.playerdataid == -1) {
			playerdata = data[data.length - 1];
			//console.log(playerdata);
		} else {
			playerdata = data[0];
		}

		//playerdata = data[0];

		// console.log(playerdata);
		var spikeEffect = calcEffectNum(playerdata.spike.total, playerdata.spike.point, playerdata.spike.miss);
		var serveEffect = calcEffectNum(playerdata.serve.total, playerdata.serve.point, playerdata.serve.miss);
		var blockEffect = calcEffectNum(playerdata.block.total, playerdata.block.point, playerdata.block.miss);

		createEffectDistributionBar(spikeEffect, blockEffect, serveEffect);
		createEffectDistributionDonut(spikeEffect, blockEffect, serveEffect);

		var spikeDet = calcDetermined(playerdata.spike.total, playerdata.spike.point);
		var serveDet = calcDetermined(playerdata.serve.total, playerdata.serve.point);
		var blockDet = calcDetermined(playerdata.block.total, playerdata.block.point);

		createDetDistributionBar(spikeDet, blockDet, serveDet);
		createDetDistributionDonut(spikeDet, blockDet, serveDet);

		createPointDistribution(playerdata.spike.point, playerdata.block.point, playerdata.serve.point);

		createMissDistribution(playerdata.spike.miss, playerdata.block.miss, playerdata.serve.miss);

		var spikeMissNet = playerdata.spike.miss_detail.net;
		var spikeMissOut = playerdata.spike.miss_detail.out;
		var spikeMissBlock = playerdata.spike.miss_detail.block;

		createSpikeMissDetailDistribution(spikeMissNet, spikeMissOut, spikeMissBlock);

		var serveMissNet = playerdata.serve.miss_detail.net;
		var serveMissOut = playerdata.serve.miss_detail.out;

		createServeMissDetailDistribution(serveMissNet, serveMissOut);
	}

	function createEffectDistributionDonut(spike, block, serve) {
		// console.log("spike" + spike);
		// console.log("block" + block);
		// console.log("serve" + serve);
		var chart2 = c3.generate({
			bindto: '#chartEffectDistDonut',
			data: {
				columns: [['spike', spike], ['block', block],
				['serve', serve],],
				type: 'donut'
			},
			donut: { title: "効果率割合" }
		}
		);
	}
	function createEffectDistributionBar(spike, block, serve) {
		var chart = c3.generate({
			bindto: '#chartEffectDistBar',
			data: {
				columns: [
					['spike', spike],
					['block', block],
					['serve', serve],
				],
				type: 'bar'
			},
			bar: {
				width: {
					ratio: 0.5 // this makes bar width 50% of length between ticks
				}
				// or
				//width: 100 // this makes bar width 100px
			},
			axis: {
				x: {
					type: 'category',
					categories: ['']
				},
				y: {
					tick: {
						// format: d3.format("%")
						format: function (d) { return d + "%"; }
					}
				}
			},
			grid: {
				// x: {
				// 	show: true
				// },
				y: {
					show: true
				}
			},
			// bar: { title: "効果率割合" }
			title: {
				show: false,
				text: '効果率',
				position: 'top-center',   // top-left, top-center and top-right
				// padding: {
				// 	top: 20,
				// 	right: 20,
				// 	bottom: 40,
				// 	left: 50
				// }
			},
		});
	}

	function createDetDistributionDonut(spike, block, serve) {
		// console.log("spike" + spike);
		// console.log("block" + block);
		// console.log("serve" + serve);
		var chart2 = c3.generate({
			bindto: '#chartDetDistDonut',
			data: {
				columns: [['spike', spike], ['block', block],
				['serve', serve],],
				type: 'donut'
			},
			donut: { title: "決定率割合" }
		}
		);
	}
	function createDetDistributionBar(spike, block, serve) {

		var chart = c3.generate({
			bindto: '#chartDetDistBar',
			data: {
				columns: [
					['spike', spike],
					['block', block],
					['serve', serve],
				],
				type: 'bar'
			},
			bar: {
				width: {
					ratio: 0.5 // this makes bar width 50% of length between ticks
				}
				// or
				//width: 100 // this makes bar width 100px
			},
			axis: {
				x: {

					categories: ['']
				},
				y: {
					tick: {
						// format: d3.format("%")
						format: function (d) { return d + "%"; }
					}
				}
			},
			grid: {
				// x: {
				// 	show: true
				// },
				y: {
					show: true
				}
			},
			title: {
				show: false,
				text: '決定率',
				position: 'top-center',   // top-left, top-center and top-right

				// 	top: 20,
				// 	right: 20,
				// 	bottom: 40,
				// 	left: 50
				// }
			},
		});
	}

	// 得点分布（どの得点要因が多いか）
	// 効果率分布（全体の効果率のうち、何がどれぐらいの割合か）
	// ドーナツで表す
	// 積み上げで月ごとで出せるようになると経過分析ができる
	function createPointDistribution(spike, block, serve) {
		// console.log("spike" + spike);
		// console.log("block" + block);
		// console.log("serve" + serve);
		var chart2 = c3.generate({
			bindto: '#chartPointDist',
			data: {
				columns: [['spike', spike], ['block', block],
				['serve', serve],],
				type: 'donut'
			},
			donut: { title: "得点割合" }
		}
		);
	}



	function createMissDistribution(spike, block, serve) {
		// console.log("spike" + spike);
		// console.log("block" + block);
		// console.log("serve" + serve);
		var chart2 = c3.generate({
			bindto: '#charMissDist',
			data: {
				columns: [['spike', spike], ['block', block],
				['serve', serve],],
				type: 'donut'
			},
			donut: { title: "ミス割合" }
		}
		);
	}

	function createSpikeMissDetailDistribution(net, out, block) {
		var chart2 = c3.generate({
			bindto: '#chartSpikeMissDetailDist',
			data: {
				columns: [['ネット', net], ['アウト', out],
				['ブロック', block],],
				type: 'donut'
			},
			donut: { title: "スパイクミス割合" }
		}
		);
	}

	function createServeMissDetailDistribution(net, out) {
		var chart2 = c3.generate({
			bindto: '#chartServeMissDetailDist',
			data: {
				columns: [['ネット', net], ['アウト', out],
				],
				type: 'donut'
			},
			donut: { title: "サーブミス割合" }
		}
		);
	}
