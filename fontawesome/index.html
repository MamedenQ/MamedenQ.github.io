<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="../jquery-3.3.1.min.js" charset="utf-8"></script>
  <link href="https://use.fontawesome.com/releases/v5.6.1/css/all.css" rel="stylesheet">
  <title>Document</title>
</head>
<body>
  <button class="test">test</button>
  <input type="text" id="ipt"/>
  <br>
  <a href="#" class="" id="btn">testボタン</a>
  <button class="btn-sticky">abc</button>
  <!--https://fontawesome.com/icons?from=io-->
  <p><i class="fab fa-twitter"></i>ついったー</p>
  <p><i class="far fa-arrow-alt-circle-down"></i></p>
</body>
<script>
  $(document).on('click', '.test', function() {
    // alert('test');
    $('#ipt').val('aaa');
    $('#btn').addClass('btn-sticky');
  });
</script>
<style>
/*https://saruwakakun.com/html-css/reference/buttons*/
/*https://saruwakakun.com/html-css/basic/font-awesome*/

.btn-sticky {
  display: inline-block;
  padding: 0.5em 1em;
  text-decoration: none;
  background: #f7f7f7;
  border-left: solid 6px #ff7c5c;/*左線*/
  color: #ff7c5c;/*文字色*/
  font-weight: bold;
  box-shadow: 0px 2px 2px rgba(0, 0, 0, 0.29);
}
.btn-sticky:active {
  box-shadow: inset 0 0 2px rgba(128, 128, 128, 0.1);
  transform: translateY(2px);
}
</style>
