  function dispaction(obj, isFull) {
    // 周りに丸を並べる
    // サーブ、スパイク、フェイント、ブロック、レシーブ
    // 失点、リベロ、ファウル
    var num = $(".point").length;
    // console.log(num);
    var range;
    var len;
    if(isFull == true) {
      range = 360;
      len = 120;
    } else {
      range = 180;
      len = 200;
    }

    var ang = range / num;
    var pos = obj.position();

    for (var i = 0; i < num; i++) {
      // 座標を算出
      //var curang = (ang / 2) + ang * i;
      var curang = ang * (i + 1);
      var x = len * Math.cos(curang / 180 * Math.PI) + pos.left;
      var y = len * Math.sin(curang / 180 * Math.PI) + pos.top;
      // console.log('x' + x + ',y' + y);

      $('.point').eq(i).css('top', y + 'px');
      $('.point').eq(i).css('left', x + 'px');
      // $('.point').eq(i).css('visibility', '');
      // $('.point').eq(i).css('transition', '0.5s ease');

      // classで指定されているvisibilityをcssメソッド（style?）で上書きすることができない。
      $('.point').eq(i).removeClass('invisible');
      $('.point').eq(i).addClass('visible');
    }
    
    obj.css('z-index', '1');
  }

	var curServerId1 = 1;
	var curServerId2 = 1;
	
	function rotatepl(_teamid) {
		var col1, col2;
		var cur;
		
		if (_teamid == 1) {
			curServerId1--;
			if(curServerId1 == 0) {
				curServerId1 = 6;
			}
			cur = curServerId1;
			col1 = 2;
			col2 = 3;
		} else {
			curServerId2--;
			if(curServerId2 == 0) {
				curServerId2 = 6;
			}
			cur = curServerId2;
			col1 = 7;
			col2 = 6;
		}
		
    for (var i = 0; i < 6; i++) {
    	var movepl = (cur + i);
    	if(movepl > 6) {
    		movepl = movepl - 6;
    	}
    	//console.log(movepl);
    	
    	var col, row;
    	if (_teamid == 1) {
	    	if(i < 3) {
	    		col = col1;
	    		row = 3 - i;
	    	} else {
	    		col = col2;
	    		row = i - 2;
	    	}
    	} else {
	    	if(i < 3) {
	    		col = col1;
	    		row = i + 1;
	    	} else {
	    		col = col2;
	    		row = 6 - i;
	    	}
    	}
    	//console.log('movepl=' + movepl + 'row=' + row + 'col=' + col);
    	// サーバプレーヤー起点に自動配置する座標を計算
    	var toppos = (20 + 110 * row);
    	var leftpos = (20 + 110 * (col - 1));
    	//console.log('toppos=' + toppos + 'leftpos=' + leftpos);
    	
      $('.plteam'+_teamid).eq(movepl - 1).css('top', toppos + 'px');
      $('.plteam'+_teamid).eq(movepl - 1).css('left', leftpos + 'px');
      //$('.plteam'+_teamid).eq(movepl - 1).css('top', '50px');
      //$('.plteam'+_teamid).eq(movepl - 1).css('left', '50px');
            // $('.point').eq(i).css('visibility', '');
      $('.plteam'+_teamid).eq(movepl - 1).css('transition', '0.5s ease');
    }
	}
	
  $('.rotate').click(function() {

		//console.log('teamid='+teamid);
