  <style>
  .item {
  background: gray;
  width: 100px;
  height: 40px;
  position: absolute;
}
  #sortdata .ui-selecting { background: #FECA40; }
  #sortdata .ui-selected { background: #F39814; color: white; }
  
  
  .seaTabs * { box-sizing: border-box; }
.seaTabs_switch { overflow: hidden; }
.seaTabs_tab {
  float: left;
  cursor: pointer;
}
.seaTabs_switch_active { cursor: default; }
.seaTabs_item { display: none; }
.seaTabs_content_active { display: block; }






.seaTabs_switch { }
.seaTabs_tab {
  padding: 10px 20px;
  border-width: 1px 1px 1px 0;
  border-style: solid;
  border-color: #ccc;
  background: #eaeaea;
}
.seaTabs_tab:first-child {
  border-left: 1px solid #ccc;
  border-top-left-radius: 5px;
}
.seaTabs_tab:last-child { border-top-right-radius: 5px; }
.seaTabs_content { margin-top: -1px; }
.seaTabs_item {
  padding: 20px;
  border: 1px solid #ccc;
  border-radius: 0 0 5px 5px;
}
.seaTabs_switch_active {
  border-bottom: 1px solid #fff;
  background: #fff;
}

  </style>
  <title>Document</title>
</head>
<body>

<div class="seaTabs">
  <div class="seaTabs_switch">
    <div class="seaTabs_tab seaTabs_switch_active" idx="0">Tab 1</div>
    <div class="seaTabs_tab" idx="1">Tab 2</div>
    <div class="seaTabs_tab" idx="2">+</div>
  </div>
  <div class="seaTabs_content">

  $( ".seaTabs" ).tabs();
  $('#sortdata').sortable();
  $('#sortdata').selectable();
  $('#score').droppable({
    drop: dropItem,
  });
  function dropItem(event, ui) {
    var _kind = ui.draggable.attr('kind');
    if (_kind == 'item') {
      alert('test');
    }
  }
  var pos;
  $('.item').draggable({
    start: function(event, ui) {
      pos = $(this).position();
      $(this).css('opacity', 0.5);
      $(this).css('transition', '0s');

      // dispaction($(this), false);
      //dispaction($(this), true);
    },
    stop: function(event, ui) {
      $(this).css('top', pos.top + 'px');
      $(this).css('left', pos.left + 'px');
      $(this).css('transition', '0.5s ease');
      $(this).css('opacity', 1.0);

      // for(var obj in $('point').eq) {

        //$('.point').eq(i).removeClass('visible');
        //$('.point').eq(i).addClass('invisible');
      //}
    },
  });

    $(this).append('<tr><th>5</th><td>モンスターハンター XX</td><td>2017年8月25日</td></tr>');
  });
  var selectedIdx = 0;
  $(document).on('click', '.seaTabs_tab', function() {
    if ($(this).text() == '+') {
      var newIdx = $(".seaTabs_tab").length;
      //alert(newIdx);
      $('.seaTabs_switch').append('<div class="seaTabs_tab" idx="' + newIdx + '">+</div>');
      $('.seaTabs_content').append('<div class="seaTabs_item">Tab ' + (newIdx + 1) + ' content</div>');
      $(this).text('added');
    }
       for (var i = 0; i < $(".seaTabs_tab").length; i++) {
         //if ($(this) == $('.seaTabs_tab').eq(i).get(0)) {
         if(i == $(this).attr('idx')) {
           $('.seaTabs_tab').eq(i).addClass('seaTabs_switch_active');
           $('.seaTabs_item').eq(i).addClass('seaTabs_content_active');
           //console.log('aaa');
         } else {
           $('.seaTabs_tab').eq(i).removeClass('seaTabs_switch_active');
           $('.seaTabs_item').eq(i).removeClass('seaTabs_content_active');
           //console.log('bbb');
         }
      }
    
  });
  
  </script>
