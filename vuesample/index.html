    html {
        height: 100%;

    body {
        height: 100%;
        margin: 0;

    #app {
        height: 100%;
        margin: 0;
    }

    .grid-main {
        height: 100%;
        display: grid;
        grid-template-columns: 100px 1fr 100px;
        grid-template-rows: 100px 1fr 100px;
        grid-template-areas: "header header header""navi_a contents navi_b""footer footer footer"
    }

    .header {
        grid-area: header;
    }

    .contents {
        grid-area: contents;
    }

    .footer {
        grid-area: footer;
    }

    .grid-scoreinput {
        height: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr 100px;

    }

    .grid-action {

        grid-template-columns: 1fr;

        grid-template-areas: "serve""spike""block""receive""other_miss""faul";
        grid-area: grid-action;
    }

    .grid-kind {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr;
        grid-template-areas: "rally""point""miss""a""b""c";
        grid-area: grid-kind;
    }

    .grid-detail {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr;
        grid-template-areas: "detail1""detail2""detail3""detail4""detail5""detail6";
        grid-area: grid-detail;
    }

        grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr;
        grid-template-areas: "b9 b8 b7""b6 b5 b4""b3 b2 b1""a1 a2 a3""a4 a5 a6""a7 a8 a9";
