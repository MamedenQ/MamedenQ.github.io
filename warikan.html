<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<script src="jquery-3.3.1.min.js" charset="utf-8"></script>
	<title>ワリカン計算</title>
</head>
<body>
	<div id="grp">
	<span class="nm">1</span><button class="btn">btn</button>
	</div>
	<br /><br /><button class="calc">calc</button>
</body>
<script>
var cnt = 2;
$('.btn').on('click', function() {
	//alert('test');
	$('#grp').append('<br /><span class="nm">' + cnt + '</span><button class="btn">btn</button>');
	cnt = cnt + 1;
});
var test = 0;
$('.calc').on('click', function() {
	test = 0;
	$(".nm").each(function(i) {
		//console.log(i + ': ' + $(this).text());
		test = test + parseInt($(this).text());
		//alert(i);
	});
	alert(test);
});
</script>
</html>
